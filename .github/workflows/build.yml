name: Build Winatra AI APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (biar error ketauan sebelum build lama-lama)
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK (debug dulu, biar cepat & gratis compute)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: winatra-ai-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
