name: winatraai
description: "Winatra AI — asisten belajar, asisten harian, keyboard AI, dan asisten aksesibilitas dalam satu ekosistem."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  cloud_functions: ^4.7.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  share_plus: ^9.0.0
  http: ^1.2.1
  firebase_storage: ^11.7.0
  file_picker: ^6.2.0
  path_provider: ^2.1.3
  # NOTE: tambahin dependency baru satu-satu, jangan borongan.

  # Tiap nambah, langsung test build di GitHub Actions sebelum lanjut nambah yang lain.
  # Ini buat cegah corrupt state kayak project sebelumnya.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
  - assets/images/logo.png
  - assets/images/robot/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"